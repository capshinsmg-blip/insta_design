<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;background:#131316;font-family:'Pretendard Variable',sans-serif;color:#fff;overflow:hidden;position:relative}
  .mono{font-family:'SF Mono','Consolas','Courier New',monospace}
</style>
</head>
<body>
  <div style="position:absolute;top:88px;left:80px"><div style="font-size:21px;font-weight:600;letter-spacing:0.13em;color:#CF5C3F;margin-bottom:32px">TIP 03</div></div>
  <div style="position:absolute;top:180px;left:80px;right:80px;font-size:46px;font-weight:700;line-height:1.32;letter-spacing:-0.015em">
    서브에이전트로<br/><span style="color:#CF5C3F">병렬 처리</span>
  </div>

  <!-- 4개 터미널 그리드 -->
  <div style="position:absolute;top:460px;left:80px;right:80px;display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div style="background:rgba(255,255,255,0.07);border-radius:16px;padding:28px 24px;border:1px solid rgba(255,255,255,0.08)">
      <div class="mono" style="font-size:15px;color:#CF5C3F;margin-bottom:12px">agent-1</div>
      <div class="mono" style="font-size:17px;color:rgba(255,255,255,0.6);line-height:1.8">$ lint src/<br/><span style="color:rgba(91,200,106,0.7)">✓</span> 0 errors</div>
    </div>
    <div style="background:rgba(255,255,255,0.07);border-radius:16px;padding:28px 24px;border:1px solid rgba(255,255,255,0.08)">
      <div class="mono" style="font-size:15px;color:#CF5C3F;margin-bottom:12px">agent-2</div>
      <div class="mono" style="font-size:17px;color:rgba(255,255,255,0.6);line-height:1.8">$ test api/<br/><span style="color:rgba(91,200,106,0.7)">✓</span> 48 passed</div>
    </div>
    <div style="background:rgba(255,255,255,0.07);border-radius:16px;padding:28px 24px;border:1px solid rgba(255,255,255,0.08)">
      <div class="mono" style="font-size:15px;color:#CF5C3F;margin-bottom:12px">agent-3</div>
      <div class="mono" style="font-size:17px;color:rgba(255,255,255,0.6);line-height:1.8">$ build prod<br/><span style="color:rgba(91,200,106,0.7)">✓</span> bundle ok</div>
    </div>
    <div style="background:rgba(255,255,255,0.07);border-radius:16px;padding:28px 24px;border:1px solid rgba(255,255,255,0.08)">
      <div class="mono" style="font-size:15px;color:#CF5C3F;margin-bottom:12px">agent-4</div>
      <div class="mono" style="font-size:17px;color:rgba(255,255,255,0.6);line-height:1.8">$ docs gen<br/><span style="color:rgba(91,200,106,0.7)">✓</span> 12 pages</div>
    </div>
  </div>

  <!-- 시간 비교 -->
  <div style="position:absolute;bottom:200px;left:80px;right:80px;display:flex;justify-content:center;gap:60px;align-items:baseline">
    <div style="text-align:center">
      <div style="font-size:18px;color:rgba(255,255,255,0.4);margin-bottom:8px">순차</div>
      <div class="mono" style="font-size:40px;font-weight:700;color:rgba(255,255,255,0.35);text-decoration:line-through">40분</div>
    </div>
    <div style="font-size:28px;color:rgba(255,255,255,0.3)">→</div>
    <div style="text-align:center">
      <div style="font-size:18px;color:rgba(255,255,255,0.4);margin-bottom:8px">병렬</div>
      <div class="mono" style="font-size:40px;font-weight:700;color:#CF5C3F">12분</div>
    </div>
  </div>

  <div style="position:absolute;bottom:88px;left:80px;font-size:20px;color:rgba(255,255,255,0.25)">동시에 돌리면 체감이 다르다.</div>
</body>
</html>
