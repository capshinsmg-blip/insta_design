<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;background:#131316;font-family:'Pretendard Variable',sans-serif;color:#fff;overflow:hidden;position:relative}
  .mono{font-family:'SF Mono','Consolas','Courier New',monospace}
</style>
</head>
<body>
  <div style="position:absolute;top:88px;left:80px"><div style="font-size:21px;font-weight:600;letter-spacing:0.13em;color:#CF5C3F;margin-bottom:32px">TIP 02</div></div>
  <div style="position:absolute;top:180px;left:80px;right:80px;font-size:46px;font-weight:700;line-height:1.32;letter-spacing:-0.015em">
    코딩 전에<br/><span style="color:#CF5C3F">Plan Mode</span> 먼저
  </div>

  <!-- 3단계 다이어그램 -->
  <div style="position:absolute;top:480px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center">
    <!-- 분석 -->
    <div style="text-align:center">
      <div style="width:180px;height:180px;border-radius:50%;border:2px solid rgba(255,255,255,0.35);display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:36px;margin-bottom:8px">🔍</div>
        <div style="font-size:22px;font-weight:600;color:rgba(255,255,255,0.8)">분석</div>
      </div>
    </div>
    <!-- 화살표 -->
    <div style="font-size:32px;color:rgba(255,255,255,0.4)">→</div>
    <!-- 계획 -->
    <div style="text-align:center">
      <div style="width:180px;height:180px;border-radius:50%;border:2.5px solid #CF5C3F;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(207,92,63,0.15)">
        <div style="font-size:36px;margin-bottom:8px">📋</div>
        <div style="font-size:22px;font-weight:600;color:#CF5C3F">계획</div>
      </div>
    </div>
    <!-- 화살표 -->
    <div style="font-size:32px;color:rgba(255,255,255,0.4)">→</div>
    <!-- 실행 -->
    <div style="text-align:center">
      <div style="width:180px;height:180px;border-radius:50%;border:2px solid rgba(255,255,255,0.35);display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:36px;margin-bottom:8px">⚡</div>
        <div style="font-size:22px;font-weight:600;color:rgba(255,255,255,0.8)">실행</div>
      </div>
    </div>
  </div>

  <!-- 단축키 -->
  <div style="position:absolute;bottom:240px;left:80px;right:80px;text-align:center">
    <div class="mono" style="display:inline-block;padding:16px 40px;border-radius:12px;background:rgba(255,255,255,0.08);font-size:28px;font-weight:600;letter-spacing:0.04em;color:rgba(255,255,255,0.7)">Shift + Tab</div>
  </div>

  <div style="position:absolute;bottom:88px;left:80px;font-size:20px;color:rgba(255,255,255,0.25)">계획 없는 코딩은 시간 낭비.</div>
</body>
</html>
